<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Group - FairShare</title>
    <style>
        :root {
            --bg-base: #0a0a0a;
            --bg-surface: #1a1a1a;
            --bg-input: #252525;
            --accent-blue: #007AFF;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --error-red: #ff453a;
            --border: #333333;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--bg-surface);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid var(--border);
            width: 90%;
            max-width: 400px;
        }

        h2 {
            margin: 0 0 24px 0;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: -0.5px;
        }

        /* フォーム要素のスタイル */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        input {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-blue);
        }

        input::placeholder {
            color: #555;
        }

        /* 登録ボタン */
        .RGbtn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.2s, filter 0.2s;
        }

        .RGbtn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .RGbtn:active {
            transform: translateY(0);
        }

        /* エラーメッセージ */
        .error-msg {
            color: var(--error-red);
            background-color: rgba(255, 69, 58, 0.1);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 16px;
            text-align: center;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-sub);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>グループ参加</h2>

        <form action="{{/api/join_group}}" method="POST" class="form-group">
            <input type="text" name="group_name" id="GroupID" placeholder="グループID (例: summer-trip-2024)" required>
            <input type="text" name="user_name" id="UserID" placeholder="あなたのユーザーネーム" required>
            <input type="password" name="password" id="UserPass" placeholder="パスワード" required>
            
            <button type="submit" class="RGbtn">Join Group</button>
        </form>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        {% if success %}
            <script>
                localStorage.setItem('currentGroup', '{{ group_id }}');
                localStorage.setItem('currentUser', '{{ user_id }}');
                // 成功時に自動で遷移させる場合は以下をコメントイン
                // window.location.href = "/compute.html";
            </script>
        {% endif %}
    </div>

</body>
</html>
