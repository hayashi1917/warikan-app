<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Group - FairShare</title>
    <style>
        :root {
            --bg-base: #0a0a0a;
            --bg-surface: #1a1a1a;
            --bg-input: #252525;
            --accent-blue: #007AFF;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --error-red: #ff453a;
            --border: #333333;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--bg-surface);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid var(--border);
            width: 90%;
            max-width: 400px;
        }

        h2 {
            margin: 0 0 24px 0;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: -0.5px;
        }

        /* フォーム要素のスタイル */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        input {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-blue);
        }

        input::placeholder {
            color: #555;
        }

        /* 登録ボタン */
        .RGbtn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.2s, filter 0.2s;
        }

        .RGbtn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .RGbtn:active {
            transform: translateY(0);
        }

        /* エラーメッセージ */
        .error-msg {
            color: var(--error-red);
            background-color: rgba(255, 69, 58, 0.1);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 16px;
            text-align: center;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-sub);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>グループ新規作成</h2>
        <form id ="createGroupForm" class= "form-group">
        <input type="text" name = "group_name"id="GroupID" placeholder="GroupID">
        <input type="text" name = "user_name" id="UserID" placeholder="UserID">
        <input type="password" id="UserPass" placeholder="Password">
        <button id="RG_button" class="RGbtn">Register Group</button>
        </form>

</div>

<script>
    document.getElementById('createGroupForm').addEventListener('submit', async (e) => {
    e.preventDefault(); // デフォルトのページ遷移を防止

    const groupID = document.getElementById('GroupID').value;
    const userID = document.getElementById('UserID').value;
    const password = document.getElementById('UserPass').value;
    const messageArea = document.getElementById('messageArea');

    try {
        const response = await fetch('/api/create_group', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                group_name: groupID,
                user_name: userID,
                password: password
            })
        });

        const data = await response.json();

        if (response.ok) {
            // 成功時の処理 (Jinja2の {% if success %} 相当)
            localStorage.setItem('currentGroup', data.group_id);
            localStorage.setItem('currentUser', data.user_id);
            
            messageArea.innerHTML = `<div class="success-msg">グループ作成に成功しました！</div>`;
            
            // 遷移させる場合はこちら
            // window.location.href = "/compute.html";
        } else {
            // 失敗時の処理 (Jinja2の {% if error %} 相当)
            messageArea.innerHTML = `<div class="error-msg">${data.error || 'エラーが発生しました'}</div>`;
        }
    } catch (err) {
        console.error('通信エラー:', err);
        messageArea.innerHTML = `<div class="error-msg">サーバーとの通信に失敗しました</div>`;
    }
}
</script>
</body>
</html>
