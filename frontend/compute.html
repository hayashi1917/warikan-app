<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compute-FairShare</title>
    <link rel="stylesheet" href="../../static/css/compute.css">
    <link rel="stylesheet" href="../../static/css/style.css">
    <script src="../../static/js/compute.js" defer></script>
</head>
<body>
        <header>        
            <a href="index.html"><h1>FairShare</h1></a>

            <nav class="navlinks">
                <a href = "start.html" class=>Login/Sign Up</a>
                <a href = "about.html" class=>About</a>
                <a href = "compute.html" class=>Compute</a>
            </nav>
        </header>
        
<div class="container">
    <div class="header-info">
        <h1>Payment Manager</h1>
        <div>
            <span id="display-user">User: ---</span>
            <span id="display-group" class="group-tag">Group: ---</span>
        </div>
    </div>

    <div id="input-section">
        <div style="margin-bottom: 15px;">
            <strong>Payer:</strong> 
            <input type="text" id="Payer" placeholder="name" readonly> 
        </div>

        <div id="payeeListContainer">
            <div class="payee-row">
                <input type="text" class="p-name" placeholder="Payee">
                <input type="number" class="p-amount" placeholder="Amount"> 
            </div>
        </div>
        
        <button class="add-row-btn" onclick="addPayeeRow()">Add Payee</button>
        <button class="register-btn" onclick="registerPayment()">Submit the Payment</button>
    </div>

    <h2>Pending Approval</h2>
    <ul id="unapprovedList"></ul>

    <h2>Approved Payments</h2>
    <ul id="approvedList"></ul>

    <h2>Settlement</h2>
    <button class="add-row-btn" style="background:#4a90e2" onclick="calculateMinFlow()">Settle Balances</button>
    <div id="Output">No data to display</div>
</div>

</body>
</html>
