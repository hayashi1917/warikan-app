<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compute - FairShare</title>
    <style>
:root { 
    --primary-color: #64b5f6; 
    --bg-color: #121212; 
    --card-bg: #1e1e1e; 
    --text-main: #e0e0e0; 
    --text-sub: #b0b0b0; 
    --danger-color: #ff5252; 
}

body { 
    font-family: 'Helvetica Neue', Arial, sans-serif; 
    line-height: 1.6; 
    padding: 20px; 
    background-color: var(--bg-color); 
    color: var(--text-main); 
}

.container { 
    max-width: 800px; 
    margin: auto; 
    background: var(--card-bg); 
    padding: 30px; 
    border-radius: 12px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
}

/* ヘッダー・情報表示 */
.header-info { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    border-bottom: 2px solid var(--primary-color); 
    margin-bottom: 20px; 
    padding-bottom: 10px; 
}

.group-tag { 
    background: var(--primary-color); 
    color: #121212; 
    padding: 4px 12px; 
    border-radius: 20px; 
    font-size: 0.9rem; 
    font-weight: bold;
}

h2 { 
    font-size: 1.2rem; 
    margin-top: 30px; 
    color: var(--primary-color); 
}

/* 入力エリア */
#input-section { 
    background: #2c2c2c; 
    padding: 20px; 
    border-radius: 8px; 
    margin-bottom: 20px; 
}

.payee-row { 
    display: flex; 
    gap: 10px; 
    margin-bottom: 8px; 
    align-items: center; 
}

input { 
    background-color: #333; 
    border: 1px solid #444; 
    color: #fff; 
    border-radius: 4px; 
    padding: 8px 12px; 
    font-size: 14px; 
}

input::placeholder { 
    color: #888; 
}

input[type="number"] { 
    width: 120px; 
}

button { 
    cursor: pointer; 
    border-radius: 4px; 
    border: none; 
    padding: 8px 16px; 
    transition: 0.2s; 
    font-weight: bold; 
}

.add-row-btn { 
    background: #444; 
    color: #eee; 
    margin: 10px 0; 
}

.register-btn { 
    background: var(--primary-color); 
    color: #121212; 
    width: 100%; 
    font-size: 1rem; 
    padding: 12px; 
    margin-top: 10px; 
}

.register-btn:hover { 
    background: #90caf9; 
}

/* リスト表示 */
ul { 
    list-style: none; 
    padding: 0; 
}

li { 
    background: #252525; 
    border: 1px solid #333; 
    margin: 10px 0; 
    padding: 15px; 
    border-radius: 8px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
}

.main-info span { 
    color: var(--primary-color); 
    font-weight: bold; 
}

.detail-text { 
    font-size: 0.85rem; 
    color: var(--text-sub); 
    margin-top: 5px; 
}

.approval-status { 
    font-size: 0.8rem; 
    background: #333; 
    color: #aaa; 
    padding: 2px 8px; 
    border-radius: 4px; 
}

/* ボタン類 */
.approve-btn { 
    background: #2e7d32; 
    color: white; 
}

.approve-btn:disabled { 
    background: #444; 
    color: #777; 
    cursor: not-allowed; 
}

.delete-btn { 
    background: var(--danger-color); 
    color: white; 
    padding: 4px 8px; 
}

/* 出力エリア */
#Output { 
    margin-top: 20px; 
    padding: 20px; 
    background: #1a2634; 
    color: #81c784; 
    border-radius: 8px; 
    white-space: pre-wrap; 
    font-family: 'Courier New', monospace; 
    border-left: 5px solid var(--primary-color); 
}
    </style>
</head>
<body>

<div class="container">
    <div class="header-info">
        <h1>Payment Tracker</h1>
        <div>
            <span id="display-user">User: ---</span>
            <span id="display-group" class="group-tag">Group: ---</span>
        </div>
    </div>

    <div id="input-section">
        <div style="margin-bottom: 15px;">
            <strong>支払った人:</strong> 
            <input type="text" id="payer" placeholder="名前"> さん
        </div>

        <div id="payeeListContainer">
            <div class="payee-row">
                <input type="text" class="p-name" placeholder="借りた人（対象者）">
                <input type="number" class="p-amount" placeholder="金額"> 円
            </div>
        </div>
        
        <button class="add-row-btn" onclick="addPayeeRow()">＋ 建て替え先を追加</button>
        <button class="register-btn" onclick="registerPayment()">この内容で申請する（未承認へ）</button>
    </div>

    <h2>未承認の支払い <small>(関係者全員の承認が必要)</small></h2>
    <ul id="unapprovedList"></ul>

    <h2>承認済みの支払い</h2>
    <ul id="approvedList"></ul>

    <h2>最終精算（最小フロー計算結果）</h2>
    <button class="add-row-btn" style="background:#4a90e2" onclick="calculateMinFlow()">最新の計算結果を取得</button>
    <div id="Output">承認されたデータがありません</div>
</div>

<script>
    // 認証情報の取得（localStorageから）
    const CURRENT_GROUP = localStorage.getItem('currentGroup');
    const CURRENT_USER = localStorage.getItem('currentUser');

    // ログインしていない場合は戻す
    if (!CURRENT_GROUP || !CURRENT_USER) {
        alert("ログイン情報がありません。TOPページに戻ります。");
        window.location.href = "index.html"; 
    }

    document.getElementById('display-user').innerText = `User: ${CURRENT_USER}`;
    document.getElementById('display-group').innerText = `Group: ${CURRENT_GROUP}`;

    let payments = [];

    // ページ読み込み時にデータを取得
    window.onload = loadPayments;

    // --- 1. バックエンドからのデータ取得 ---
    async function loadPayments() {
        try {
            const response = await fetch(`/api/payments?groupID=${CURRENT_GROUP}`);
            if (!response.ok) throw new Error("データ取得失敗");
            payments = await response.json();
            render();
        } catch (e) {
            console.error(e);
            // 本番運用前はモックデータでテスト可能
        }
    }

    // --- 2. 支払い登録（POST） ---
    async function registerPayment() {
        const payerName = document.getElementById('payer').value;
        const nameInputs = document.querySelectorAll('.p-name');
        const amountInputs = document.querySelectorAll('.p-amount');
        
        let details = [];
        let total = 0;

        nameInputs.forEach((el, i) => {
            const val = parseFloat(amountInputs[i].value);
            if (el.value && !isNaN(val)) {
                details.push({ name: el.value, amount: val });
                total += val;
            }
        });

        if (!payerName || details.length === 0) {
            alert("入力内容が不完全です");
            return;
        }

        const newData = {
            groupID: CURRENT_GROUP,
            id: Date.now(),
            payer: payerName,
            total: total,
            details: details,
            approvedBy: [CURRENT_USER], // 申請者は承認済みとする
            createdBy: CURRENT_USER
        };

        try {
            await fetch('/api/payments/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newData)
            });
            clearInput();
            await loadPayments();
        } catch (e) {
            alert("保存に失敗しました。");
        }
    }

    // --- 3. 承認処理（POST） ---
    async function approvePayment(paymentId) {
        try {
            await fetch('/api/payments/approve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    paymentId: paymentId,
                    userID: CURRENT_USER,
                    groupID: CURRENT_GROUP
                })
            });
            await loadPayments();
        } catch (e) {
            alert("承認に失敗しました。");
        }
    }

    // --- 4. 最小フロー計算（POST） ---
    async function calculateMinFlow() {
        const outputDiv = document.getElementById('Output');
        outputDiv.innerText = "計算中...";

        try {
            const response = await fetch('/api/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ groupID: CURRENT_GROUP })
            });
            const result = await response.json();
            outputDiv.innerText = result.instructions.join('\n') || "清算の必要はありません。";
        } catch (e) {
            outputDiv.innerText = "計算データの取得に失敗しました。";
        }
    }

    // --- UI補助機能 ---
    function addPayeeRow() {
        const container = document.getElementById('payeeListContainer');
        const div = document.createElement('div');
        div.className = 'payee-row';
        div.innerHTML = `
            <input type="text" class="p-name" placeholder="名前">
            <input type="number" class="p-amount" placeholder="金額"> 円
            <button class="delete-btn" onclick="this.parentElement.remove()">×</button>
        `;
        container.appendChild(div);
    }

    function clearInput() {
        document.getElementById('payer').value = "";
        document.getElementById('payeeListContainer').innerHTML = `
            <div class="payee-row">
                <input type="text" class="p-name" placeholder="名前">
                <input type="number" class="p-amount" placeholder="金額"> 円
            </div>`;
    }

    function render() {
        const unapprovedUl = document.getElementById('unapprovedList');
        const approvedUl = document.getElementById('approvedList');
        unapprovedUl.innerHTML = "";
        approvedUl.innerHTML = "";

        payments.forEach(p => {
            // 全員が承認したかチェック (detailsの全員がapprovedByに含まれているか)
            const targetNames = p.details.map(d => d.name);
            const isFullyApproved = targetNames.every(name => p.approvedBy.includes(name));

            const li = document.createElement('li');
            const detailStr = p.details.map(d => `${d.name}(${d.amount}円)`).join(', ');
            
            // 自分の承認が必要か
            const needsMyApproval = targetNames.includes(CURRENT_USER) && !p.approvedBy.includes(CURRENT_USER);

            li.innerHTML = `
                <div class="main-info">
                    <span>${p.payer}</span> → ${p.total}円<br>
                    <small class="detail-text">内訳: ${detailStr}</small><br>
                    <small class="approval-status">承認済: ${p.approvedBy.join(', ')}</small>
                </div>
                <div>
                    ${!isFullyApproved ? 
                        `<button class="approve-btn" ${!needsMyApproval ? 'disabled' : ''} onclick="approvePayment(${p.id})">
                            ${needsMyApproval ? '承認する' : '承認待ち'}
                        </button>` : 
                        `<span style="color:green; font-weight:bold;">✓ 完了</span>`
                    }
                </div>
            `;

            if (isFullyApproved) {
                approvedUl.appendChild(li);
            } else {
                unapprovedUl.appendChild(li);
            }
        });
    }
</script>

</body>
</html>
