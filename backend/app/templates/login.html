<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>login</title>
    </head>
    <body>
        <form action="{{url_for('register.login')}}" method="POST">
            
            <input type="text" name="groupId" id="GroupID" placeholder="GroupID" required>
            <input type="text" name="userId" id="UserID" placeholder="UserID" required>
            <input type="password" name="password" id="UserPass" placeholder="Password" required>
            
            <button type="submit" class="Lbtn">login</button>
            
        </form>
        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}
        
        {% if success %}
            <script>
                localStorage.setItem('currentGroup', '{{ group_id }}');
                localStorage.setItem('currentUser', '{{ user_id }}');
                
                window.location.href = "{{url_for('payment')}}";
            </script>
        {% endif %}
    </body>
</html>
