<body>

    <div class="container">
        <div class="header-info">
            <h1>Payment Tracker</h1>
            <div>
                <span id="display-user">User: ---</span>
                <span id="display-group" class="group-tag">Group: ---</span>
            </div>
        </div>

        <div id="input-section">
            <div style="margin-bottom: 15px;">
                <strong>支払った人:</strong>
                <select id="payer"></select> さん
            </div>

            <div style="margin-bottom: 15px;">
                <strong>通貨:</strong>
                <select id="currency-select"></select>
            </div>

            <div id="payeeListContainer">
                <div class="payee-row">
                    <select class="p-name"></select>
                    <input type="number" class="p-amount" placeholder="金額">
                </div>
            </div>

            <button class="add-row-btn" onclick="addPayeeRow()">＋ 建て替え先を追加</button>
            <button class="register-btn" onclick="registerPayment()">この内容で申請する（未承認へ）</button>
        </div>

        <h2>未承認の支払い <small>(関係者全員の承認が必要)</small></h2>
        <ul id="unapprovedList"></ul>

        <h2>承認済みの支払い</h2>
        <ul id="approvedList"></ul>

        <h2>最終精算（最小フロー計算結果）</h2>
        <button class="add-row-btn" style="background:#4a90e2" onclick="calculateMinFlow()">最新の計算結果を取得</button>
        <div id="Output">承認されたデータがありません</div>
    </div>

    <script>
        // 認証情報とメンバー一覧（ページ初期化時にセッション API から取得する）
        let CURRENT_GROUP_ID = null;
        let CURRENT_GROUP = null;
        let CURRENT_USER = null;
        let MEMBER_NAMES = [];

        const CURRENCY_OPTIONS = ["JPY", "USD", "EUR", "GBP"];
        let payments = [];

        // ページ読み込み時にセッション情報を取得してから初期化する
        window.onload = async () => {
            await loadSessionInfo();
            initializeMemberSelectors();
            await loadPayments();
        };

        // --- 0. セッション情報の取得 ---
        async function loadSessionInfo() {
            try {
                const response = await fetch('/register/me');
                if (!response.ok) {
                    alert("ログイン情報がありません。TOPページに戻ります。");
                    window.location.href = "/";
                    return;
                }
                const data = await response.json();
                CURRENT_GROUP_ID = data.group_id;
                CURRENT_GROUP = data.group_name;
                CURRENT_USER = data.user_name;

                document.getElementById('display-user').innerText = `User: ${CURRENT_USER}`;
                document.getElementById('display-group').innerText = `Group: ${CURRENT_GROUP}`;

                // メンバー一覧もサーバーから取得する
                const membersResponse = await fetch(`/payment/members`);
                if (membersResponse.ok) {
                    const membersData = await membersResponse.json();
                    MEMBER_NAMES = membersData.members || [];
                }
            } catch (e) {
                alert("セッション情報の取得に失敗しました。");
                window.location.href = "/";
            }
        }

        // --- 1. バックエンドからのデータ取得 ---
        async function loadPayments() {
            try {
                const response = await fetch(`/payment/list`);
                if (!response.ok) throw new Error("データ取得失敗");
                const result = await response.json();
                payments = result.all || [];
                render();
            } catch (e) {
                console.error(e);
            }
        }

        function buildMemberOptions(includeEmpty = true) {
            const emptyOption = includeEmpty ? '<option value="">選択してください</option>' : '';
            const memberOptions = MEMBER_NAMES.map(name => `<option value="${name}">${name}</option>`).join('');
            return `${emptyOption}${memberOptions}`;
        }

        function initializeMemberSelectors() {
            const payerSelect = document.getElementById('payer');
            payerSelect.innerHTML = buildMemberOptions();
            if (MEMBER_NAMES.includes(CURRENT_USER)) {
                payerSelect.value = CURRENT_USER;
            }

            document.querySelectorAll('.p-name').forEach(select => {
                select.innerHTML = buildMemberOptions();
            });

            const currencySelect = document.getElementById('currency-select');
            currencySelect.innerHTML = CURRENCY_OPTIONS
                .map(code => `<option value="${code}">${code}</option>`)
                .join('');
            currencySelect.value = 'JPY';
        }

        function getCurrencySymbol(currencyCode) {
            const symbols = {
                JPY: '¥',
                USD: '$',
                EUR: '€',
                GBP: '£'
            };
            return symbols[currencyCode] || currencyCode;
        }

        function formatCurrencyAmount(amount, currencyCode) {
            const symbol = getCurrencySymbol(currencyCode);
            return `${amount}${symbol}`;
        }

        // --- 2. 支払い登録（POST） ---
        async function registerPayment() {
            const payerName = document.getElementById('payer').value;
            const nameInputs = document.querySelectorAll('.p-name');
            const amountInputs = document.querySelectorAll('.p-amount');

            let splits = [];
            let total = 0;

            nameInputs.forEach((el, i) => {
                const val = parseFloat(amountInputs[i].value);
                if (el.value && !isNaN(val)) {
                    splits.push({ beneficiary_user_name: el.value, amount: val });
                    total += val;
                }
            });

            if (!payerName || splits.length === 0) {
                alert("入力内容が不完全です");
                return;
            }

            const selectedCurrency = document.getElementById('currency-select').value || 'JPY';

            const newData = {
                group_id: CURRENT_GROUP_ID,
                title: `${payerName}の立替`,
                amount_total: total,
                currency_code: selectedCurrency,
                splits: splits
            };

            try {
                const response = await fetch('/payment/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newData)
                });
                const result = await response.json();
                if (result.status === "success") {
                    alert("登録しました");
                    clearInput();
                    await loadPayments();
                } else {
                    alert("エラー: " + (result.detail || "登録に失敗しました"));
                }
            } catch (e) {
                alert("保存に失敗しました。");
            }
        }

        // --- 3. 承認処理（POST） ---
        async function approvePayment(paymentId) {
            try {
                await fetch(`/payment/authenticate?payment_id=${paymentId}`, {
                    method: 'POST',
                });
                await loadPayments();
            } catch (e) {
                alert("承認に失敗しました。");
            }
        }

        // --- 4. 支払い削除（DELETE） ---
        async function deletePayment(paymentId) {
            const confirmed = confirm("この支払い申請を削除しますか？\n※作成者のみ削除できます。");
            if (!confirmed) return;

            try {
                const response = await fetch(`/payment/${paymentId}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                if (!response.ok || result.status !== 'success') {
                    throw new Error(result.detail || '削除に失敗しました');
                }
                await loadPayments();
            } catch (e) {
                alert(e.message || '削除に失敗しました。');
            }
        }

        // --- 5. 最小フロー精算計算（GET） ---
        async function calculateMinFlow() {
            const outputDiv = document.getElementById('Output');
            outputDiv.innerText = "計算中...";

            try {
                const response = await fetch(`/payment/settlements`);
                const result = await response.json();
                const settlements = result?.result?.settlements || [];
                outputDiv.innerText = settlements.length
                    ? settlements
                        .map(s => `${s.from_user_name} → ${s.to_user_name}: ${formatCurrencyAmount(s.amount, 'JPY')}`)
                        .join('\n')
                    : "清算の必要はありません。";
            } catch (e) {
                outputDiv.innerText = "計算データの取得に失敗しました。";
            }
        }

        // --- UI補助機能 ---
        function addPayeeRow() {
            const container = document.getElementById('payeeListContainer');
            const div = document.createElement('div');
            div.className = 'payee-row';
            div.innerHTML = `
            <select class="p-name">${buildMemberOptions()}</select>
            <input type="number" class="p-amount" placeholder="金額">
            <button class="delete-btn" onclick="this.parentElement.remove()">×</button>
        `;
            container.appendChild(div);
        }

        function clearInput() {
            document.getElementById('payer').value = "";
            document.getElementById('currency-select').value = 'JPY';
            document.getElementById('payeeListContainer').innerHTML = `
            <div class="payee-row">
                <select class="p-name">${buildMemberOptions()}</select>
                <input type="number" class="p-amount" placeholder="金額">
            </div>`;
        }

        function render() {
            const unapprovedUl = document.getElementById('unapprovedList');
            const approvedUl = document.getElementById('approvedList');
            unapprovedUl.innerHTML = "";
            approvedUl.innerHTML = "";

            payments.forEach(p => {
                const targetNames = p.splits.map(d => d.beneficiary_user_name);
                const approvedBy = p.splits.filter(d => d.approved).map(d => d.beneficiary_user_name);
                const isFullyApproved = p.is_approved;

                const li = document.createElement('li');
                const currencyCode = p.currency_code || 'JPY';
                const detailStr = p.splits
                    .map(d => `${d.beneficiary_user_name}(${formatCurrencyAmount(d.amount, currencyCode)})`)
                    .join(', ');

                // 自分の承認が必要か
                const needsMyApproval = targetNames.includes(CURRENT_USER) && !approvedBy.includes(CURRENT_USER);

                li.innerHTML = `
                <div class="main-info">
                    <span>${p.paid_by_user_name}</span> → ${formatCurrencyAmount(p.amount_total, currencyCode)}<br>

                    <small class="detail-text">内訳: ${detailStr}</small><br>
                    <small class="approval-status">承認済: ${approvedBy.join(', ')}</small>
                </div>
                <div class="payment-actions">
                    ${!isFullyApproved ?
                        `<button class="approve-btn" ${!needsMyApproval ? 'disabled' : ''} onclick="approvePayment(${p.payment_id})">
                            ${needsMyApproval ? '承認する' : '承認待ち'}
                        </button>` :
                        `<span style="color:green; font-weight:bold;">✓ 完了</span>`
                    }
                    ${p.paid_by_user_name === CURRENT_USER ?
                        `<button class="delete-payment-btn" onclick="deletePayment(${p.payment_id})">この申請を削除</button>` :
                        ''
                    }
                </div>
            `;

                if (isFullyApproved) {
                    approvedUl.appendChild(li);
                } else {
                    unapprovedUl.appendChild(li);
                }
            });
        }
    </script>

</body>

</html> -->

            <h1>Payment Manager</h1>
            <span id="display-group">Group: ---</span>

        <div id="input-section">
            <div style="margin-bottom: 15px;">
                <strong>Payer:</strong>
                <span id="payer"></span>

            <button class="register-btn" onclick="registerPayment()">Submit the Payment</button>
        </div>

        <h2>Pending Approval</h2>
        <ul id="unapprovedList"></ul>

        <h2>Approved Payments</h2>
        <ul id="approvedList"></ul>

        <h2>Settlement</h2>
        <button class="add-row-btn" style="background:#4a90e2" onclick="calculateMinFlow()">Settle Balances</button>
        <div id="Output">No data to display</div>
    </div>

</body>

</html>
