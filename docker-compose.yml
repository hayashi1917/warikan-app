services:
  db:
    image: postgres:16
    container_name: warikan-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-warikan_app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      TZ: Asia/Tokyo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-postgres}\" -d \"${POSTGRES_DB:-warikan_app}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: 
      context: .
      dockerfile: Dockerfile.local
    
    container_name: warikan-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-warikan_app}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-replace-with-a-random-secret}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    
    volumes:
      - ./:/app
  
volumes:
  postgres_data:
