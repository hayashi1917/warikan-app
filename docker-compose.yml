services:
  db:
    image: mysql:8.4
    container_name: canon_milc_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: canon_milc_info
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      TZ: Europe/Paris
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: canon_milc_app
    working_dir: /app/src
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      TZ: Europe/Paris
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_DATABASE: canon_milc_info
      MYSQL_PAYMENT_TABLE: payment_results
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./data:/data

volumes:
  mysql_data:
