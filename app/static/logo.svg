<svg width="360" height="100" viewBox="0 0 360 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64ffda; stop-opacity:1" />
    </linearGradient>
    
    <marker id="arrowhead-neon" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64ffda" />
    </marker>

    <filter id="glow-effect">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(10, 10)" filter="url(#glow-effect)">
    <g transform="translate(35, 40)">
      <circle r="14" fill="none" stroke="url(#neon-grad)" stroke-width="2" opacity="0.9" />
      <rect x="-2" y="-8" width="4" height="16" rx="1" fill="url(#neon-grad)" />
      <circle r="7" fill="none" stroke="url(#neon-grad)" stroke-width="0.5" stroke-dasharray="2,1" />
    </g>

    <path d="M35,10 A30,30 0 1,1 34.9,10" 
          fill="none" 
          stroke="url(#neon-grad)" 
          stroke-width="3" 
          stroke-linecap="round"
          marker-end="url(#arrowhead-neon)" />
  </g>

  <g transform="translate(100, 62)">
    <text font-family="Arial, sans-serif" font-weight="900" font-size="45" fill="url(#neon-grad)">Fair</text>
    <text x="100" y="0" font-family="Arial, sans-serif" font-weight="100" font-size="45" fill="#FFFFFF">Share</text>
  </g>
</svg>